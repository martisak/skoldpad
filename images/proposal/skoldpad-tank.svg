<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -14 220 164" width="220" height="164">
  <!-- lightning bolts, after the armoured troops badge -->
  <g fill="#e9b32a">

    <polygon points="0,0 9,0 6,-16 14,-14 2,-38 6,-18 -3,-20" transform="translate(128,36) rotate(32) scale(-1.15,1.15)"/>
  </g>
  <!-- turret = a keycap -->
  <rect x="84" y="30" width="48" height="40" rx="9" fill="#1d1d1b"/>
  <rect x="92" y="37" width="32" height="20" rx="5" fill="none" stroke="#e9b32a" stroke-width="4"/>
  <!-- barrel -->
  <rect x="130" y="42" width="60" height="9" rx="4.5" fill="#1d1d1b"/>
  <rect x="184" y="38" width="12" height="17" rx="4" fill="#1d1d1b"/>
  <!-- hull = a wide keycap -->
  <rect x="38" y="64" width="144" height="32" rx="9" fill="#e9b32a"/>
  <!-- track -->
  <rect x="26" y="90" width="168" height="46" rx="23" fill="#1d1d1b"/>
  <circle cx="56" cy="113" r="11" fill="#e9b32a"/>
  <circle cx="92" cy="113" r="11" fill="#e9b32a"/>
  <circle cx="128" cy="113" r="11" fill="#e9b32a"/>
  <circle cx="164" cy="113" r="11" fill="#e9b32a"/>
</svg>